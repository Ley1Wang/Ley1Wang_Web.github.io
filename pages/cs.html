<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Computer Science Projects</title>
<link rel="icon" href="../assets/nana.ico">

<style>
:root {
    --bg: #f3fdf8;
    --card: #ffffff;
    --primary: #065f46;
    --accent: #10b981;
    --text: #1f2937;
    --subtext: #6b7280;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
}

.topbar {
    height: 60px;
    background: #072E33;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
}

.topbar .title {
    color: white;
    font-size: 18px;
}

.topbar a {
    color: white;
    text-decoration: none;
    opacity: 0.8;
}

.topbar a:hover {
    opacity: 1;
}

.container {
    max-width: 1180px;
    margin: 70px auto;
    padding: 0 28px;
}

h1 {
    color: var(--primary);
    margin-bottom: 36px;
    font-size: 34px;
}

.project-list {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 32px;
}

.card {
    background: var(--card);
    border-radius: 12px;
    padding: 26px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    transition: 0.2s;
}

.card:hover {
    transform: translateY(-4px);
}

.card h3 {
    margin: 0;
    color: var(--primary);
    font-size: 24px;
}

.card p {
    color: var(--subtext);
    margin: 12px 0;
    line-height: 1.58;
    font-size: 16px;
}

.visual {
    width: 100%;
    aspect-ratio: 16 / 10;
    margin-top: 16px;
    padding: 18px;
    box-sizing: border-box;
    border: 1px solid #d1fae5;
    border-radius: 10px;
    background: #fbfffd;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

.visual img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    border-radius: 8px;
}

.button {
    display: inline-block;
    margin-top: 14px;
    padding: 10px 16px;
    background: var(--accent);
    color: white;
    border-radius: 6px;
    text-decoration: none;
    font-weight: 600;
}

.button:hover {
    opacity: 0.9;
}

@media (max-width: 720px) {
    .project-list {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>
<div class="topbar">
    <div class="title">Computer Science Projects</div>
    <a href="https://wangleyi.top">Home</a>
</div>

<div class="container">
    <h1>Computer Science Projects</h1>

    <div class="project-list">
        <div class="card">
            <h3>Personal Website</h3>
            <p>A GitHub Pages portfolio site for projects, physics simulations, and contact links.</p>
            <div class="visual">
                <img src="../images/abstract_web.svg" alt="Personal website preview">
            </div>
            <a href="https://wangleyi.top" class="button">Open &rarr;</a>
        </div>

        <div class="card">
            <h3>Web Analytics Setup</h3>
            <p>Lightweight page-view tracking with GoatCounter across the portfolio site.</p>
            <div class="visual">
                <img src="../images/abstract_analytics.svg" alt="Web analytics preview">
            </div>
            <a href="https://wangleyi.goatcounter.com" class="button">Open &rarr;</a>
        </div>
    </div>
</div>

<script data-goatcounter="https://wangleyi.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</body>
</html>
