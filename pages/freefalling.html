<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Freefalling Simulation</title>
<link rel="icon" href="../assets/freefalling.ico">


<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #f3fdf8;
    --primary: #065f46;
    --accent: #10b981;
    --text: #1f2937;
    --subtext: #6b7280;
}


body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    background: var(--bg);
    color: var(--text);
}

.topbar {
    height: 50px;
    background: #072E33;

    display: flex;
    align-items: center;
    justify-content: space-between;

    padding: 0 15px;
}

.topbar span {
    color: white;
    font-weight: 500;
}

.topbar a {
    color: white;
    text-decoration: none;
    margin-left: 10px;
    opacity: 0.85;
}

.topbar a:hover {
    opacity: 1;
}
.container {
    max-width: 700px;
    margin: 40px auto;
    padding: 0 15px;
}


h1 {
    font-size: 26px;
    font-weight: 600;
    color: var(--primary);
}
.scene {
    position: relative;

    width: 300px;
    height: 400px;

    margin: 30px auto;

    border: 2px solid #ccc;
    background: white;
}

#ball {
    width: 30px;
    height: 30px;

    border-radius: 50%;
    background: #10b981;

    position: absolute;

    top: 0;
    left: 135px;
}
</style>
</head>
<script src="../js/freefalling.js"></script>
<body>
<div class="topbar">
    <span>Physics</span>
    <div>
        <a href="https://wangleyi.top">Home</a>
        <a href="https://wangleyi.top/pages/physics">Projects</a>
    </div>
</div>

<div class="container">
    <h1>Free Fall Simulator</h1>

    <p>
        Compare free-fall motion on different planets.
    </p>
    <div class="scene">
        <div id="ball"></div>
    </div>
    <select id="planet">
        <option>Mercury</option>
        <option>Venus</option>
        <option>Earth</option>
        <option>Moon</option>
        <option>Mars</option>
        <option>Jupiter</option>
        <option>Saturn</option>
        <option>Uranus</option>
        <option>Neptune</option>
    </select>

    <input
        id="heightInput"
        type="number"
        value="100"
        placeholder="Height (m)">

    <button onclick="startFall()">
        Start
    </button>

    <button onclick="resetFall()">
        Reset
    </button>

</div>
</body>

</html>
