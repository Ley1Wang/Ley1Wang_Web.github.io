<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lenz Law Demo</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    padding: 30px;
    background: #f5f5f5;
}

input {
    padding: 10px;
    margin: 5px;
    width: 120px;
}

button {
    padding: 10px 15px;
    background: black;
    color: white;
    border: none;
    border-radius: 6px;
}

.box {
    background: white;
    padding: 20px;
    margin-top: 20px;
    display: inline-block;
    border-radius: 10px;
}
.scene {
    position: relative;
    width: 400px;
    height: 200px; 
    margin: 40px auto;
    border: 2px solid #ccc;
    transform: scale(1.5);
    transform-origin: center;
    perspective: 800px;

}


#coil-back {
    position: absolute;
    width: 120px;
    height: 120px;

    border: 6px solid #333;
    border-radius: 50%;

    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%) rotateY(60deg);

    z-index: 1;
}
#magnet {
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);

    width: 80px;
    height: 50px;

    background: linear-gradient(to right, red, blue);

    z-index: 2;
}
#coil-front {
    position: absolute;
    width: 120px;
    height: 120px;
    transform: translate(-50%, -50%) rotateY(60deg);
    border: 6px solid #333;
    border-radius: 50%;

    left: 50%;
    top: 50%;

    z-index: 3;


    clip-path: inset(0 0 0 50%);
}

.wrapper {
    width: 100%;
    height: 100%;

    position: relative;

    transform-style: preserve-3d;
}
</style>

</head>

<body>

<h1>⚡Lenz Law Simulator⚡</h1>

<div>
    <input id="B" placeholder="B (Tesla)">
    <input id="v" placeholder="v (m/s)">
    <input id="N" placeholder="Turns">
    <button onclick="calc()">Calculate</button>
</div>
<div class="scene">
    <div class="wrapper">
        <div id="coil-back"></div>
        <div id="magnet"></div>
        <div id="coil-front"></div>
    </div>
</div>


<div class="box">
    <p id="emf">EMF: </p>
    <p id="current">Current: </p>
</div>



<script src="../js/lenz.js"></script>
</div>
</body>
</html>
