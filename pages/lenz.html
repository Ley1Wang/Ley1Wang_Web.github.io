<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="../assets/lenz.ico">
<title>Lenz Law Demo</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    text-align: center;
    padding: 30px;
    background: #f5f5f5;
}

input {
    padding: 10px;
    margin: 5px;
    width: 120px;
}

button {
    padding: 10px 15px;
    background: black;
    color: white;
    border: none;
    border-radius: 6px;
}

.box {
    background: white;
    padding: 20px;
    margin-top: 20px;
    display: inline-block;
    border-radius: 10px;
}
.scene {
    position: relative;
    width: 400px;
    height: 200px; 
    margin: 40px auto;
    border: 2px solid #ccc;
    transform: scale(1.5);
    transform-origin: center;
    perspective: 800px;

}
#coil-back,
#coil-front {
    position: absolute;
    width: 130px;
    height: 130px;

    border: 10px solid #444;

    border-radius: 50%;

    left: 50%;
    top: 50%;

    transform: translate(-50%, -50%) rotateY(65deg);
    background: none;



}


#coil-back {
    z-index: 1;
}


#coil-front {
    z-index: 3;

    clip-path: inset(0 0 0 50%);
}

#magnet {
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);

    width: 80px;
    height: 50px;

    border-radius: 6px;

    background: linear-gradient(
        to right,
        #ff4d4d,
        #cc0000 35%,
        #0033cc,
        #6699ff
    );

    z-index: 2;
    box-shadow:
        0 10px 20px rgba(0,0,0,0.35),
        inset 0 2px 6px rgba(255,255,255,0.4);
}
.wrapper {
    width: 100%;
    height: 100%;

    position: relative;

    transform-style: preserve-3d;
}
</style>

</head>

<body>

<h1>⚡Lenz Law Simulator⚡</h1>

<div>
    <input id="B" placeholder="B (Tesla)">
    <input id="v" placeholder="v (m/s)">
    <input id="N" placeholder="Turns">
    <button onclick="calc()">Calculate</button>
</div>
<br>

<div class="box">
    <p id="emf">EMF: </p>
    <p id="current">Current: </p>
</div>
<br>

<div class="scene">
    <div class="wrapper">
        <div id="coil-back"></div>
        <div id="magnet"></div>
        <div id="coil-front"></div>
    </div>
</div>






<script src="../js/lenz.js"></script>
</div>
</body>
</html>
