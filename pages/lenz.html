<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lenz Law Demo</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    padding: 30px;
    background: #f5f5f5;
}

input {
    padding: 10px;
    margin: 5px;
    width: 120px;
}

button {
    padding: 10px 15px;
    background: black;
    color: white;
    border: none;
    border-radius: 6px;
}

.box {
    background: white;
    padding: 20px;
    margin-top: 20px;
    display: inline-block;
    border-radius: 10px;
}
</style>

</head>

<body>

<h1>⚡Lenz Law Simulator⚡</h1>

<div>
    <input id="B" placeholder="B (Tesla)">
    <input id="v" placeholder="v (m/s)">
    <input id="N" placeholder="Turns">
    <button onclick="calc()">Calculate</button>
</div>

<div class="box">
    <p id="emf">EMF: </p>
    <p id="current">Current: </p>
</div>

<script src="../js/lenz.js"></script>

</body>
</html>
