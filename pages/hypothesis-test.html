<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hypothesis Test Simulator</title>
<link rel="icon" href="../assets/nana.ico">

<style>
:root {
    --bg: #f3fdf8;
    --panel: #ffffff;
    --primary: #065f46;
    --accent: #10b981;
    --ink: #072E33;
    --text: #1f2937;
    --subtext: #6b7280;
    --line: #d1fae5;
    --danger: #dc2626;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
}

.topbar {
    height: 60px;
    padding: 0 20px;
    background: var(--ink);
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.topbar .title,
.topbar a {
    color: #ffffff;
}

.topbar a {
    opacity: 0.85;
    text-decoration: none;
}

.container {
    max-width: 1180px;
    margin: 58px auto;
    padding: 0 28px;
}

h1 {
    margin: 0 0 12px;
    color: var(--primary);
    font-size: 34px;
}

.intro {
    max-width: 760px;
    margin: 0 0 28px;
    color: var(--subtext);
    line-height: 1.65;
}

.workspace {
    display: grid;
    grid-template-columns: 360px minmax(0, 1fr);
    gap: 28px;
    align-items: start;
}

.panel {
    background: var(--panel);
    border-radius: 12px;
    padding: 24px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
}

.control-group {
    margin-bottom: 18px;
}

label {
    display: block;
    margin-bottom: 8px;
    color: var(--primary);
    font-weight: 700;
}

select,
input {
    width: 100%;
    padding: 11px 12px;
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text);
    font-size: 15px;
    outline: none;
}

select:focus,
input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(16,185,129,0.14);
}

button {
    border: 0;
    border-radius: 8px;
    padding: 11px 16px;
    background: var(--accent);
    color: #ffffff;
    font-weight: 700;
    cursor: pointer;
}

canvas {
    width: 100%;
    height: 390px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: #fbfffd;
    display: block;
}

.results {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 14px;
    margin-top: 16px;
}

.result {
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px;
    background: #fbfffd;
}

.result span {
    display: block;
    color: var(--subtext);
    font-size: 13px;
}

.result strong {
    display: block;
    margin-top: 5px;
    color: var(--primary);
    font-size: 20px;
}

.decision {
    margin-top: 16px;
    padding: 16px;
    border-radius: 10px;
    border: 1px solid var(--line);
    color: var(--primary);
    background: #ecfdf5;
    line-height: 1.55;
    font-weight: 700;
}

.decision.reject {
    border-color: #fecaca;
    color: #991b1b;
    background: #fff1f2;
}

@media (max-width: 880px) {
    .workspace {
        grid-template-columns: 1fr;
    }

    .results {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>
<div class="topbar">
    <div class="title">Hypothesis Test Simulator</div>
    <a href="https://wangleyi.top/pages/stat">Statistics</a>
</div>

<main class="container">
    <h1>Hypothesis Test Simulator</h1>
    <p class="intro">Run a one-sample mean test, compare the observed statistic against the null distribution, and see how the p-value changes.</p>

    <div class="workspace">
        <section class="panel">
            <div class="control-group">
                <label for="testType">Test Type</label>
                <select id="testType">
                    <option value="z">Z-test</option>
                    <option value="t">T-test</option>
                </select>
            </div>

            <div class="grid-2">
                <div class="control-group">
                    <label for="sampleMean">Sample Mean</label>
                    <input id="sampleMean" type="number" value="53" step="0.1">
                </div>
                <div class="control-group">
                    <label for="nullMean">Null Mean</label>
                    <input id="nullMean" type="number" value="50" step="0.1">
                </div>
            </div>

            <div class="grid-2">
                <div class="control-group">
                    <label for="sampleSd">Std Dev</label>
                    <input id="sampleSd" type="number" value="8" min="0.1" step="0.1">
                </div>
                <div class="control-group">
                    <label for="sampleSize">Sample Size</label>
                    <input id="sampleSize" type="number" value="36" min="2" step="1">
                </div>
            </div>

            <div class="grid-2">
                <div class="control-group">
                    <label for="alpha">Alpha</label>
                    <input id="alpha" type="number" value="0.05" min="0.001" max="0.2" step="0.001">
                </div>
                <div class="control-group">
                    <label for="tail">Tail</label>
                    <select id="tail">
                        <option value="two">Two-tailed</option>
                        <option value="right">Right-tailed</option>
                        <option value="left">Left-tailed</option>
                    </select>
                </div>
            </div>

            <button id="runButton">Run Test</button>
        </section>

        <section class="panel">
            <canvas id="chart" width="900" height="420"></canvas>
            <div class="results">
                <div class="result">
                    <span>Test Statistic</span>
                    <strong id="statOut">0</strong>
                </div>
                <div class="result">
                    <span>P-value</span>
                    <strong id="pOut">1</strong>
                </div>
                <div class="result">
                    <span>Standard Error</span>
                    <strong id="seOut">0</strong>
                </div>
            </div>
            <div class="decision" id="decisionOut"></div>
        </section>
    </div>
</main>

<script>
const chart = document.getElementById("chart");
const ctx = chart.getContext("2d");

function value(id) {
    return Number(document.getElementById(id).value);
}

function erf(x) {
    const sign = x < 0 ? -1 : 1;
    const absX = Math.abs(x);
    const a1 = 0.254829592;
    const a2 = -0.284496736;
    const a3 = 1.421413741;
    const a4 = -1.453152027;
    const a5 = 1.061405429;
    const p = 0.3275911;
    const t = 1 / (1 + p * absX);
    const y = 1 - (((((a5 * t + a4) * t) + a3) * t + a2) * t + a1) * t * Math.exp(-absX * absX);
    return sign * y;
}

function normalCdf(x) {
    return 0.5 * (1 + erf(x / Math.sqrt(2)));
}

function normalPdf(x) {
    return Math.exp(-0.5 * x * x) / Math.sqrt(2 * Math.PI);
}

function tAdjustedStatistic(statistic, df) {
    if (df >= 30) return statistic;
    const scale = Math.sqrt(df / Math.max(1, df - 2));
    return statistic / scale;
}

function pValue(statistic, tail, testType, df) {
    const effective = testType === "t" ? tAdjustedStatistic(statistic, df) : statistic;
    const cdf = normalCdf(effective);

    if (tail === "right") return 1 - cdf;
    if (tail === "left") return cdf;
    return 2 * Math.min(cdf, 1 - cdf);
}

function criticalValue(alpha, tail) {
    const target = tail === "two" ? 1 - alpha / 2 : 1 - alpha;
    let lo = -5;
    let hi = 5;
    for (let i = 0; i < 60; i += 1) {
        const mid = (lo + hi) / 2;
        if (normalCdf(mid) < target) lo = mid;
        else hi = mid;
    }
    return (lo + hi) / 2;
}

function format(number) {
    return Number(number.toFixed(4)).toString();
}

function xToCanvas(x, left, width) {
    return left + (x + 4) / 8 * width;
}

function yToCanvas(y, top, height, maxY) {
    return top + height - y / maxY * height;
}

function drawCurve(statistic, alpha, tail) {
    const left = 70;
    const top = 36;
    const width = chart.width - 120;
    const height = chart.height - 92;
    const maxY = 0.45;

    ctx.clearRect(0, 0, chart.width, chart.height);

    ctx.strokeStyle = "#072E33";
    ctx.lineWidth = 4;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(left, top + height);
    ctx.lineTo(left + width, top + height);
    ctx.stroke();

    const crit = criticalValue(alpha, tail);
    const shadeRanges = [];
    if (tail === "right") shadeRanges.push([crit, 4]);
    if (tail === "left") shadeRanges.push([-4, -crit]);
    if (tail === "two") {
        shadeRanges.push([-4, -crit]);
        shadeRanges.push([crit, 4]);
    }

    shadeRanges.forEach(([start, end]) => {
        ctx.fillStyle = "rgba(220,38,38,0.18)";
        ctx.beginPath();
        ctx.moveTo(xToCanvas(start, left, width), top + height);
        for (let i = 0; i <= 80; i += 1) {
            const x = start + (end - start) * i / 80;
            ctx.lineTo(xToCanvas(x, left, width), yToCanvas(normalPdf(x), top, height, maxY));
        }
        ctx.lineTo(xToCanvas(end, left, width), top + height);
        ctx.closePath();
        ctx.fill();
    });

    ctx.strokeStyle = "#10b981";
    ctx.lineWidth = 6;
    ctx.beginPath();
    for (let i = 0; i <= 200; i += 1) {
        const x = -4 + 8 * i / 200;
        const y = normalPdf(x);
        const canvasX = xToCanvas(x, left, width);
        const canvasY = yToCanvas(y, top, height, maxY);
        if (i === 0) ctx.moveTo(canvasX, canvasY);
        else ctx.lineTo(canvasX, canvasY);
    }
    ctx.stroke();

    const markerX = Math.max(-4, Math.min(4, statistic));
    const markerCanvasX = xToCanvas(markerX, left, width);
    ctx.strokeStyle = "#065f46";
    ctx.lineWidth = 5;
    ctx.setLineDash([8, 10]);
    ctx.beginPath();
    ctx.moveTo(markerCanvasX, top + 12);
    ctx.lineTo(markerCanvasX, top + height);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillStyle = "#065f46";
    ctx.font = "16px Arial";
    ctx.fillText(`observed statistic = ${format(statistic)}`, left, chart.height - 22);
}

function runTest() {
    const testType = document.getElementById("testType").value;
    const sampleMean = value("sampleMean");
    const nullMean = value("nullMean");
    const sd = Math.max(0.1, value("sampleSd"));
    const n = Math.max(2, Math.round(value("sampleSize")));
    const alpha = Math.min(0.2, Math.max(0.001, value("alpha")));
    const tail = document.getElementById("tail").value;

    const se = sd / Math.sqrt(n);
    const statistic = (sampleMean - nullMean) / se;
    const p = pValue(statistic, tail, testType, n - 1);
    const reject = p < alpha;

    drawCurve(statistic, alpha, tail);

    document.getElementById("statOut").textContent = format(statistic);
    document.getElementById("pOut").textContent = format(p);
    document.getElementById("seOut").textContent = format(se);

    const decision = document.getElementById("decisionOut");
    decision.classList.toggle("reject", reject);
    decision.textContent = reject
        ? `Reject H0 at alpha = ${alpha}. The observed result is statistically significant.`
        : `Fail to reject H0 at alpha = ${alpha}. The observed result is not statistically significant.`;
}

document.getElementById("runButton").addEventListener("click", runTest);
document.querySelectorAll("input, select").forEach(element => element.addEventListener("input", runTest));
document.querySelectorAll("select").forEach(element => element.addEventListener("change", runTest));

runTest();
</script>

<script data-goatcounter="https://wangleyi.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</body>
</html>
