<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wave Interference Simulator</title>
<link rel="icon" href="../assets/physics.ico">

<style>
:root {
    --bg: #f3fdf8;
    --panel: #ffffff;
    --primary: #065f46;
    --accent: #10b981;
    --ink: #072E33;
    --text: #1f2937;
    --subtext: #6b7280;
    --line: #d1fae5;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
}

.topbar {
    height: 60px;
    padding: 0 20px;
    background: var(--ink);
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.topbar .title,
.topbar a {
    color: #ffffff;
}

.topbar a {
    opacity: 0.85;
    text-decoration: none;
}

.container {
    max-width: 1180px;
    margin: 58px auto;
    padding: 0 28px;
}

h1 {
    margin: 0 0 12px;
    color: var(--primary);
    font-size: 34px;
}

.intro {
    max-width: 760px;
    margin: 0 0 28px;
    color: var(--subtext);
    line-height: 1.65;
}

.workspace {
    display: grid;
    grid-template-columns: 340px minmax(0, 1fr);
    gap: 28px;
    align-items: start;
}

.panel {
    background: var(--panel);
    border-radius: 12px;
    padding: 24px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.control {
    margin-bottom: 20px;
}

label {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 10px;
    color: var(--primary);
    font-weight: 700;
}

label span {
    color: var(--subtext);
    font-weight: 600;
}

input[type="range"] {
    width: 100%;
    accent-color: var(--accent);
}

.button-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

button {
    border: 0;
    border-radius: 8px;
    padding: 11px 16px;
    background: var(--accent);
    color: #ffffff;
    font-weight: 700;
    cursor: pointer;
}

button.secondary {
    background: #ecfdf5;
    color: var(--primary);
}

canvas {
    width: 100%;
    height: 520px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: #fbfffd;
    display: block;
}

.readout {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 14px;
    margin-top: 16px;
}

.readout div {
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px;
    background: #fbfffd;
}

.readout span {
    display: block;
    color: var(--subtext);
    font-size: 13px;
}

.readout strong {
    display: block;
    margin-top: 5px;
    color: var(--primary);
    font-size: 20px;
}

@media (max-width: 880px) {
    .workspace {
        grid-template-columns: 1fr;
    }

    .readout {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>
<div class="topbar">
    <div class="title">Wave Interference Simulator</div>
    <a href="https://wangleyi.top/pages/physics">Physics</a>
</div>

<main class="container">
    <h1>Wave Interference Simulator</h1>
    <p class="intro">Adjust two coherent wave sources and observe where constructive and destructive interference appears across the field.</p>

    <div class="workspace">
        <section class="panel">
            <div class="control">
                <label for="wavelength">Wavelength <span id="wavelengthValue">42</span></label>
                <input id="wavelength" type="range" min="24" max="80" value="42">
            </div>

            <div class="control">
                <label for="spacing">Source Spacing <span id="spacingValue">180</span></label>
                <input id="spacing" type="range" min="80" max="280" value="180">
            </div>

            <div class="control">
                <label for="phase">Phase Difference <span id="phaseValue">0.00 pi</span></label>
                <input id="phase" type="range" min="0" max="628" value="0">
            </div>

            <div class="control">
                <label for="amplitude">Amplitude <span id="amplitudeValue">1.00</span></label>
                <input id="amplitude" type="range" min="30" max="160" value="100">
            </div>

            <div class="button-row">
                <button id="drawButton">Draw</button>
                <button class="secondary" id="resetButton">Reset</button>
            </div>
        </section>

        <section class="panel">
            <canvas id="field" width="900" height="560"></canvas>
            <div class="readout">
                <div>
                    <span>Wavelength</span>
                    <strong id="lambdaOut">42</strong>
                </div>
                <div>
                    <span>Path Difference Rule</span>
                    <strong>m lambda</strong>
                </div>
                <div>
                    <span>Dark Fringe Rule</span>
                    <strong>(m + 1/2) lambda</strong>
                </div>
            </div>
        </section>
    </div>
</main>

<script>
const canvas = document.getElementById("field");
const ctx = canvas.getContext("2d");
const controls = {
    wavelength: document.getElementById("wavelength"),
    spacing: document.getElementById("spacing"),
    phase: document.getElementById("phase"),
    amplitude: document.getElementById("amplitude")
};

function number(id) {
    return Number(controls[id].value);
}

function updateLabels() {
    const phasePi = number("phase") / 314;
    document.getElementById("wavelengthValue").textContent = number("wavelength");
    document.getElementById("spacingValue").textContent = number("spacing");
    document.getElementById("phaseValue").textContent = `${phasePi.toFixed(2)} pi`;
    document.getElementById("amplitudeValue").textContent = (number("amplitude") / 100).toFixed(2);
    document.getElementById("lambdaOut").textContent = number("wavelength");
}

function colorFor(value) {
    const intensity = Math.min(1, Math.abs(value));
    if (value >= 0) {
        const g = Math.round(120 + 80 * intensity);
        const b = Math.round(110 + 70 * (1 - intensity));
        return `rgb(16, ${g}, ${b})`;
    }

    const shade = Math.round(210 - 100 * intensity);
    return `rgb(${shade}, 250, 229)`;
}

function drawField() {
    updateLabels();

    const width = canvas.width;
    const height = canvas.height;
    const wavelength = number("wavelength");
    const spacing = number("spacing");
    const phase = number("phase") / 100;
    const amplitude = number("amplitude") / 100;
    const sourceY = height * 0.36;
    const sourceA = { x: width / 2 - spacing / 2, y: sourceY };
    const sourceB = { x: width / 2 + spacing / 2, y: sourceY };
    const cell = 8;

    ctx.clearRect(0, 0, width, height);

    for (let y = 0; y < height; y += cell) {
        for (let x = 0; x < width; x += cell) {
            const r1 = Math.hypot(x - sourceA.x, y - sourceA.y);
            const r2 = Math.hypot(x - sourceB.x, y - sourceB.y);
            const waveA = Math.sin(2 * Math.PI * r1 / wavelength);
            const waveB = Math.sin(2 * Math.PI * r2 / wavelength + phase);
            const value = amplitude * (waveA + waveB) / 2;

            ctx.fillStyle = colorFor(value);
            ctx.globalAlpha = 0.28 + Math.min(0.42, Math.abs(value) * 0.42);
            ctx.fillRect(x, y, cell + 1, cell + 1);
        }
    }

    ctx.globalAlpha = 1;
    drawSource(sourceA, "#10b981");
    drawSource(sourceB, "#34d399");
    drawRings(sourceA, wavelength);
    drawRings(sourceB, wavelength);
}

function drawSource(source, color) {
    ctx.fillStyle = color;
    ctx.strokeStyle = "#072E33";
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.arc(source.x, source.y, 12, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
}

function drawRings(source, wavelength) {
    ctx.strokeStyle = "rgba(7,46,51,0.18)";
    ctx.lineWidth = 2;
    for (let radius = wavelength; radius < 360; radius += wavelength) {
        ctx.beginPath();
        ctx.arc(source.x, source.y, radius, 0, Math.PI * 2);
        ctx.stroke();
    }
}

function reset() {
    controls.wavelength.value = 42;
    controls.spacing.value = 180;
    controls.phase.value = 0;
    controls.amplitude.value = 100;
    drawField();
}

Object.values(controls).forEach(input => input.addEventListener("input", drawField));
document.getElementById("drawButton").addEventListener("click", drawField);
document.getElementById("resetButton").addEventListener("click", reset);

drawField();
</script>

<script data-goatcounter="https://wangleyi.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</body>
</html>
