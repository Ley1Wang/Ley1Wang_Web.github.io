<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Radar Simulation</title>
<link rel="icon" href="../assets/physics.ico">


<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #f3fdf8;
    --primary: #065f46;
    --accent: #10b981;
    --text: #1f2937;
    --subtext: #6b7280;
}


body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
}

.topbar {
    height: 50px;
    background: #072E33;

    display: flex;
    align-items: center;
    justify-content: space-between;

    padding: 0 15px;
}

.topbar span {
    color: white;
    font-weight: 500;
}

.topbar a {
    color: white;
    text-decoration: none;
    margin-left: 10px;
    opacity: 0.85;
}

.topbar a:hover {
    opacity: 1;
}
.container {
    max-width: 700px;
    margin: 40px auto;
    padding: 0 15px;
}


h1 {
    font-size: 26px;
    font-weight: 600;
    color: var(--primary);
}


canvas {
    margin-top: 20px;
    width: 100%;
    max-width: 400px;
    background: #000;
    border-radius: 10px;
}


p {
    color: var(--subtext);
}
</style>
</head>
<body>

<div class="topbar">
    <span>Physics</span>
    <div>
        <a href="https://wangleyi.top">Home</a>
        <a href="https://wangleyi.top/pages/physics">Projects</a>
    </div>
</div>

<div class="container">

<h1>Radar Simulation</h1>

<p>
    Visualizes a rotating radar system detecting objects in real time.
</p>

<canvas id="radar" width="400" height="400"></canvas>
<script>
    
const canvas = document.getElementById("radar");
const ctx = canvas.getContext("2d");

let angle = 0;
const speed = 0.02;
const center = 200;
const radius = 180;


let targets = Array.from({length: 8}, () => ({
    angle: Math.random() * Math.PI * 2,
    dist: Math.random() * radius,
    highlight: false,
    life: 0
}));

function drawRadar() {
    ctx.clearRect(0, 0, 400, 400);

    ctx.strokeStyle = "green";
    ctx.beginPath();
    ctx.arc(center, center, radius, 0, Math.PI * 2);
    ctx.stroke();


    let x = center + radius * Math.cos(angle);
    let y = center + radius * Math.sin(angle);

    ctx.strokeStyle = "lime";
    ctx.beginPath();
    ctx.moveTo(center, center);
    ctx.lineTo(x, y);
    ctx.stroke();
    ctx.strokeStyle = "rgba(0,255,0,0.2)";

    targets.forEach(t => {
        let tx = center + t.dist * Math.cos(t.angle);
        let ty = center + t.dist * Math.sin(t.angle);

        if (t.life > 0) {
            ctx.fillStyle = "red";
            t.life--;
        } else {
            ctx.fillStyle = "green";
        }

        ctx.beginPath();
        ctx.arc(tx, ty, 4, 0, Math.PI * 2);
        ctx.fill();
    });
}

function update() {
    angle += speed;

    targets.forEach(t => {
        let diff = Math.abs(angle - t.angle);

        diff = Math.min(diff, Math.PI * 2 - diff);

        if (diff < 0.03) {
            t.life = 10;
        }
    });
}

function loop() {
    update();
    drawRadar();
    requestAnimationFrame(loop);
}

loop();

</script>
</div>


</body>
</html>
