<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Radar Simulation</title>
<link rel="icon" href="../assets/radar.ico">


<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #f3fdf8;
    --primary: #065f46;
    --accent: #10b981;
    --text: #1f2937;
    --subtext: #6b7280;
}


body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    background: var(--bg);
    color: var(--text);
}

.topbar {
    height: 50px;
    background: #072E33;

    display: flex;
    align-items: center;
    justify-content: space-between;

    padding: 0 15px;
}

.topbar span {
    color: white;
    font-weight: 500;
}

.topbar a {
    color: white;
    text-decoration: none;
    margin-left: 10px;
    opacity: 0.85;
}

.topbar a:hover {
    opacity: 1;
}
.container {
    max-width: 700px;
    margin: 40px auto;
    padding: 0 15px;
}


h1 {
    font-size: 26px;
    font-weight: 600;
    color: var(--primary);
}


canvas {
    margin-top: 20px;
    width: 100%;
    max-width: 400px;
    background: #000;
    border-radius: 10px;
}


p {
    color: var(--subtext);
}
</style>
</head>
<body>

<div class="topbar">
    <span>Radar</span>
    <div>
        <a href="https://wangleyi.top">Home</a>
        <a href="https://wangleyi.top/pages/physics">Projects</a>
    </div>
</div>

<div class="container">

<h1>Radar Simulation</h1>

<p>
    Visualizes a rotating radar system detecting objects in real time.
</p>

<canvas id="radar" width="400" height="400"></canvas>
<script src="../js/Radar.js"></script>
</div>


</body>
</html>
